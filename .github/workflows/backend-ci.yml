name: Django Backend CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: invpro_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Django System Checks
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-secret-key-super-secure-for-github-actions' }}
        DEBUG: "True"
        DB_NAME: "invpro_db"
        DB_USER: "postgres"
        DB_PASSWORD: "postgrespassword"
        DB_HOST: "localhost"
        DB_PORT: "5432"
      run: |
        python manage.py check
        
    - name: Run Database Migrations Check
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-secret-key-super-secure-for-github-actions' }}
        DEBUG: "True"
        DB_NAME: "invpro_db"
        DB_USER: "postgres"
        DB_PASSWORD: "postgrespassword"
        DB_HOST: "localhost"
        DB_PORT: "5432"
      run: |
        python manage.py migrate --noinput
